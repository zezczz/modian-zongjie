        // Convert raw markdown-like texts to parsed HTML + inline Latex markers
        function parseMarkdown(text) {
            if (!text) return "";
            let html = text;

            // Header level 3 (### Title)
            html = html.replace(/^###\s+(.*)$/gm, '<h4 class="text-xs font-bold text-slate-200 mt-2 mb-1 flex items-center gap-1"><span class="w-1 h-3 bg-rose-500 rounded-sm"></span>$1</h4>');
            // Header level 2 (## Title)
            html = html.replace(/^##\s+(.*)$/gm, '<h3 class="text-sm font-bold text-white border-b border-slate-700/50 pb-1 mb-2">$1</h3>');
            // Header level 1 (# Title)
            html = html.replace(/^#\s+(.*)$/gm, '<h2 class="text-lg font-black text-white pb-1 mb-2 flex items-center gap-2"><span class="w-1.5 h-5 bg-indigo-500 rounded"></span>$1</h2>');

            // Bullets
            html = html.replace(/^\s*[·•-]\s+(.*)$/gm, '<li class="ml-2 list-disc text-slate-300">$1</li>');

            // Highlight blocks (> Text)
            html = html.replace(/^>\s+(.*)$/gm, '<div class="mt-2 p-2 bg-amber-500/10 border-l-2 border-amber-500 text-amber-200 text-xs rounded-r">$1</div>');

            // Images ![alt](url) — 相对路径相对于 main.html，如 images/xxx.png
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) =>
                `<img src="${src.trim()}" alt="${alt.replace(/"/g, '&quot;')}" class="mindmap-img" loading="lazy" />`);

            // Linebreaks
            html = html.split('\n').join('<br>');

            return html;
        }

        // Determine critical priority tags for counter
        function getImportanceOfNode(node) {
            if (node.text && node.text.includes('[必考]')) return '必考';
            if (node.text && node.text.includes('[重点]')) return '重点';
            if (node.text && node.text.includes('[高频]')) return '高频';
            if (node.label && node.label.includes('[必考]')) return '必考';
            if (node.label && node.label.includes('[重点]')) return '重点';
            if (node.label && node.label.includes('[了解]')) return '了解';
            return '普通';
        }

        // Initialize App
        function init() {
            renderCanvas();
            renderSidebar();
            updateCanvasSize();
            calculateCounts();

            const afterLayout = () => {
                syncNodeHeightsFromDOM();
                waitForCardImages().then(() => {
                    syncNodeHeightsFromDOM();
                    fitMapToView();
                });
            };

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([canvas]).then(afterLayout).catch(afterLayout);
            } else {
                setTimeout(afterLayout, 150);
            }
        }

        function waitForCardImages() {
            const imgs = canvas.querySelectorAll('.mindmap-img');
            if (!imgs.length) return Promise.resolve();
            return Promise.all([...imgs].map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => {
                    img.addEventListener('load', resolve, { once: true });
                    img.addEventListener('error', resolve, { once: true });
                });
            }));
        }

        }

        function getMapBounds() {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            mapData.nodes.forEach(n => {
                const w = n.width || 300;
                const h = n.height || 100;
                minX = Math.min(minX, n.x);
                minY = Math.min(minY, n.y);
                maxX = Math.max(maxX, n.x + w);
                maxY = Math.max(maxY, n.y + h);
            });
            return { minX, minY, maxX, maxY, width: maxX - minX, height: maxY - minY };
        }

        function updateCanvasSize() {
            const bounds = getMapBounds();
            const pad = 120;
            const w = Math.ceil(bounds.width + pad * 2);
            const h = Math.ceil(bounds.height + pad * 2);
            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
            svgEdges.style.width = `${w}px`;
            svgEdges.style.height = `${h}px`;
        }

        function getMinFitScale(padding = 40) {
            const bounds = getMapBounds();
            const vw = workspace.clientWidth;
            const vh = workspace.clientHeight;
            if (bounds.width <= 0 || bounds.height <= 0) return 0.15;
            const scaleX = (vw - padding * 2) / bounds.width;
            const scaleY = (vh - padding * 2) / bounds.height;
            return Math.min(scaleX, scaleY);
        }

        function fitMapToView(padding = 40) {
            const bounds = getMapBounds();
            const vw = workspace.clientWidth;
            const vh = workspace.clientHeight;
            const fitScale = getMinFitScale(padding);
            scale = Math.min(Math.max(fitScale, 0.08), 1.5);
            const centerX = (bounds.minX + bounds.maxX) / 2;
            const centerY = (bounds.minY + bounds.maxY) / 2;
            offsetX = vw / 2 - centerX * scale;
            offsetY = vh / 2 - centerY * scale;
            updateTransform();
        }

        function syncNodeHeightsFromDOM() {
            document.querySelectorAll('.mindmap-card').forEach(card => {
                const node = mapData.nodes.find(n => n.id === card.getAttribute('data-id'));
                if (!node) return;
                const measured = Math.ceil(card.offsetHeight);
                if (measured > node.height) node.height = measured;
            });
            updateCanvasSize();
            drawEdges();
        }

        function zoom(factor) {
            const minScale = Math.min(getMinFitScale(), 0.15);
            scale = Math.min(Math.max(scale * factor, minScale), 3);
            updateTransform();
        }

        function resetView() {
            fitMapToView();
        }

        // Pan actions
        function startDrag(e) {
            if (e.target.closest('.interactive-node')) return; // Avoid drag conflict with card operations
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
            workspace.style.cursor = 'grabbing';
        }

        function drag(e) {
            if (!isDragging) return;
            offsetX = e.clientX - startX;
            offsetY = e.clientY - startY;
            updateTransform();
        }

        function endDrag() {
            isDragging = false;
            workspace.style.cursor = 'grab';
        }

        // Mousewheel Zoom helper
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomIntensity = 0.1;
            const mouseX = e.clientX - workspace.getBoundingClientRect().left;
            const mouseY = e.clientY - workspace.getBoundingClientRect().top;
            
            // Zoom towards cursor location
            const canvasMouseX = (mouseX - offsetX) / scale;
            const canvasMouseY = (mouseY - offsetY) / scale;

            const zoomFactor = e.deltaY < 0 ? (1 + zoomIntensity) : (1 - zoomIntensity);
            const minScale = Math.min(getMinFitScale(), 0.15);
            scale = Math.min(Math.max(scale * zoomFactor, minScale), 3);
            
            offsetX = mouseX - canvasMouseX * scale;
            offsetY = mouseY - canvasMouseY * scale;

            updateTransform();
        }, { passive: false });

        // Calculate card statistics
        function calculateCounts() {
            let must = 0, important = 0, freq = 0;
            mapData.nodes.forEach(n => {
                const imp = getImportanceOfNode(n);
                if (imp === '必考') must++;
                if (imp === '重点') important++;
                if (imp === '高频') freq++;
            });
            document.getElementById('count-all').innerText = mapData.nodes.length;
            document.getElementById('count-must').innerText = must;
            document.getElementById('count-important').innerText = important;
            document.getElementById('count-freq').innerText = freq;
        }

        // Filter Action
        function filterImportance(type) {
            currentFilter = type;
            const nodes = document.querySelectorAll('.interactive-node');
            nodes.forEach(el => {
                const nodeId = el.getAttribute('data-id');
                const nodeData = mapData.nodes.find(n => n.id === nodeId);
                if (!nodeData) return;
                
                const imp = getImportanceOfNode(nodeData);
                const isGroup = nodeData.type === 'group';

                if (type === 'all' || isGroup) {
                    el.style.opacity = '1';
                } else if (type === '必考' && imp === '必考') {
                    el.style.opacity = '1';
                } else if (type === '重点' && imp === '重点') {
                    el.style.opacity = '1';
                } else if (type === '高频' && imp === '高频') {
                    el.style.opacity = '1';
                } else {
                    el.style.opacity = '0.15';
                }
            });
        }

        // Focus & jump to target node (no detail page)
        function focusOnNode(id) {
            const node = mapData.nodes.find(n => n.id === id);
            if (!node) return;

            const vw = workspace.clientWidth;
            const vh = workspace.clientHeight;
            const nw = node.width || 300;
            const nh = node.height || 200;
            const pad = 48;
            const fitScale = Math.min(
                (vw - pad * 2) / nw,
                (vh - pad * 2) / nh,
                1.2
            );
            scale = Math.min(Math.max(fitScale, getMinFitScale()), 1.5);
            offsetX = vw / 2 - (node.x + nw / 2) * scale;
            offsetY = vh / 2 - (node.y + nh / 2) * scale;
            updateTransform();

            // Highlight target card
            document.querySelectorAll('.interactive-node').forEach(el => el.classList.remove('node-active'));
            const targetEl = document.getElementById(id);
            if (targetEl) {
                targetEl.classList.add('node-active');
                setTimeout(() => targetEl.classList.remove('node-active'), 3000);
            }
        }

        function handleNodeClick(node, e) {
            e.stopPropagation();
            const detailId = getDetailIdForNode(node);
            if (detailId) {
                openDetailPage(detailId);
                return;
            }
            focusOnNode(node.id);
        }

        function detailBadgeHTML() {
            return `<div class="detail-map-badge"><i class="fa-solid fa-up-right-from-square"></i> 点击进入详细导图</div>`;
        }

        function overviewHintHTML(hasDetail) {
            return hasDetail ? '<p class="overview-hint"><i class="fa-solid fa-expand"></i> 点击查看完整导图</p>' : '';
        }

        // Dynamic elements rendering
        function renderSidebar() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = '';
            
            // Filter groups
            const chapters = mapData.nodes.filter(n => n.type === 'group');
            chapters.forEach(ch => {
                let badgeColor = "bg-slate-700 text-slate-300";
                if (ch.label.includes('必考')) badgeColor = "bg-red-500/20 text-red-400 border border-red-500/30";
                else if (ch.label.includes('重点')) badgeColor = "bg-blue-500/20 text-blue-400 border border-blue-500/30";
                else if (ch.label.includes('了解')) badgeColor = "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";

                const btn = document.createElement('button');
                btn.className = `p-2 rounded bg-slate-800/60 hover:bg-slate-800 hover:text-white border border-slate-700/50 text-left flex flex-col justify-between h-16 transition text-xs`;
                const detailId = getDetailIdForNode(ch);
                btn.onclick = () => {
                    if (detailId) openDetailPage(detailId);
                    else focusOnNode(ch.id);
                };
                const detailHint = detailId ? '<span class="text-[9px] text-indigo-400 mt-0.5"><i class="fa-solid fa-map"></i> 有详细导图</span>' : '';
                btn.innerHTML = `
                    <span class="font-semibold truncate text-slate-200 w-full">${ch.label.split(' ')[0]}</span>
                    <span class="text-[10px] px-1 py-0.5 rounded ${badgeColor} inline-block truncate max-w-full">${ch.label.split(' ')[1] || ''}</span>
                    ${detailHint}
                `;
                list.appendChild(btn);
            });
        }

        function renderCanvas() {
            canvas.innerHTML = '';
            
            // 1. Separate groups & texts
            const groups = mapData.nodes.filter(n => n.type === 'group');
            const infoNodes = mapData.nodes.filter(n => n.type !== 'group');

            // 2. Render container Groups (Ch1-Ch11 boxes)
            groups.forEach(g => {
                const palette = colorPalette[g.color] || colorPalette["1"];
                const hasDetail = !!getDetailIdForNode(g);
                const groupEl = document.createElement('div');
                groupEl.id = g.id;
                groupEl.className = `absolute rounded-3xl ${palette.groupBg} ${palette.groupBorder} border-2 backdrop-blur-md p-6 interactive-node transition-all pointer-events-auto${hasDetail ? ' has-detail-map' : ''}`;
                groupEl.style.left = `${g.x}px`;
                groupEl.style.top = `${g.y}px`;
                groupEl.style.width = `${g.width}px`;
                groupEl.style.height = `${g.height}px`;
                
                groupEl.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-sm font-extrabold px-3 py-1 bg-slate-900/60 rounded-full border border-slate-700/50 ${palette.text}">
                            ${g.label}
                        </span>
                        <i class="fa-solid ${hasDetail ? 'fa-up-right-from-square text-indigo-400' : 'fa-folder-open text-slate-600'}"></i>
                    </div>
                    ${hasDetail ? detailBadgeHTML() : ''}
                `;
                groupEl.setAttribute('data-id', g.id);
                if (hasDetail) {
                    groupEl.onclick = (e) => handleNodeClick(g, e);
                }
                canvas.appendChild(groupEl);
            });

            // 3. Render text / image cards
            infoNodes.forEach(n => {
                // Pick palette based on importance/tag
                let styleBg = "bg-slate-900/90 border-slate-800 hover:border-slate-700";
                let styleTag = "text-slate-400 bg-slate-800";
                
                const imp = getImportanceOfNode(n);
                const hasDetail = !!getDetailIdForNode(n);
                if (imp === '必考') {
                    styleBg = "bg-red-500/5 border-red-500/30 hover:border-red-500/60";
                    styleTag = "text-red-400 bg-red-500/20";
                } else if (imp === '重点') {
                    styleBg = "bg-blue-500/5 border-blue-500/30 hover:border-blue-500/60";
                    styleTag = "text-blue-400 bg-blue-500/20";
                } else if (imp === '高频') {
                    styleBg = "bg-emerald-500/5 border-emerald-500/30 hover:border-emerald-500/60";
                    styleTag = "text-emerald-400 bg-emerald-500/20";
                }

                const card = document.createElement('div');
                card.id = n.id;
                card.className = `absolute rounded-xl border ${styleBg} shadow-lg pointer-events-auto interactive-node mindmap-card overview-card transition-all${hasDetail ? ' has-detail-map cursor-pointer' : ' cursor-pointer'}`;
                card.style.left = `${n.x}px`;
                card.style.top = `${n.y}px`;
                card.style.width = `${n.width}px`;
                card.style.minHeight = `${Math.min(n.height || 56, hasDetail ? 56 : 80)}px`;

                let badgeHTML = '';
                if (imp !== '普通') {
                    badgeHTML = `<span class="absolute top-4 right-4 text-[10px] font-bold px-1.5 py-0.5 rounded ${styleTag}">${imp}</span>`;
                }

                if (n.type === 'image') {
                    const caption = n.text ? parseMarkdown(n.text) : (n.alt || '');
                    card.innerHTML = `
                        ${badgeHTML}
                        <figure class="mindmap-figure tex2jax_ignore">
                            <img src="${n.src}" alt="${(n.alt || '').replace(/"/g, '&quot;')}" class="mindmap-img" loading="lazy" />
                            ${caption ? `<figcaption>${caption}</figcaption>` : ''}
                        </figure>
                    `;
                } else {
                    card.innerHTML = `
                        ${badgeHTML}
                        <div class="overview-body text-slate-300 tex2jax_process">
                            ${parseMarkdown(getOverviewText(n))}
                        </div>
                        ${overviewHintHTML(hasDetail)}
                    `;
                }
                
                card.onclick = (e) => handleNodeClick(n, e);
                card.setAttribute('data-id', n.id);
                canvas.appendChild(card);
            });

            // 4. Render Edges (arrows & links)
            drawEdges();
        }

        // Draw connections on SVG
        function drawEdges() {
            svgEdges.innerHTML = '';
            mapData.edges.forEach(edge => {
                const fromNode = mapData.nodes.find(n => n.id === edge.fromNode);
                const toNode = mapData.nodes.find(n => n.id === edge.toNode);
                if (!fromNode || !toNode) return;

                // Connection coordinates logic
                const p1 = getSideCoordinates(fromNode, edge.fromSide || 'bottom');
                const p2 = getSideCoordinates(toNode, edge.toSide || 'top');

                // Draw curve
                let pathD = "";
                if (edge.fromSide === 'bottom' && edge.toSide === 'top') {
                    const cp1Y = p1.y + Math.abs(p2.y - p1.y) * 0.5;
                    const cp2Y = p2.y - Math.abs(p2.y - p1.y) * 0.5;
                    pathD = `M ${p1.x} ${p1.y} C ${p1.x} ${cp1Y}, ${p2.x} ${cp2Y}, ${p2.x} ${p2.y}`;
                } else if (edge.fromSide === 'bottom' && edge.toSide === 'left') {
                    pathD = `M ${p1.x} ${p1.y} Q ${p1.x} ${p2.y}, ${p2.x} ${p2.y}`;
                } else {
                    const dx = Math.abs(p2.x - p1.x) * 0.5;
                    pathD = `M ${p1.x} ${p1.y} C ${p1.x + dx} ${p1.y}, ${p2.x - dx} ${p2.y}, ${p2.x} ${p2.y}`;
                }

                // Main Connection Path
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathD);
                path.setAttribute('stroke', '#475569');
                path.setAttribute('stroke-width', '2');
                path.setAttribute('fill', 'none');
                path.setAttribute('marker-end', 'url(#arrow)');
                path.className = 'transition-all duration-300';
                svgEdges.appendChild(path);

                // Add text label
                if (edge.label) {
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    const mx = (p1.x + p2.x) / 2;
                    const my = (p1.y + p2.y) / 2 - 5;
                    text.setAttribute('x', mx);
                    text.setAttribute('y', my);
                    text.setAttribute('fill', '#94a3b8');
                    text.setAttribute('font-size', '10px');
                    text.setAttribute('font-weight', '600');
                    text.setAttribute('text-anchor', 'middle');
                    text.className = 'bg-slate-950 px-1';
                    text.textContent = edge.label;
                    svgEdges.appendChild(text);
                }
            });
        }

        // Helper: get anchor point coordinates
        function getSideCoordinates(node, side) {
            const halfW = node.width / 2;
            const halfH = node.height / 2;
            const cx = node.x + halfW;
            const cy = node.y + halfH;

            switch(side) {
                case 'top': return { x: cx, y: node.y };
                case 'bottom': return { x: cx, y: node.y + node.height };
                case 'left': return { x: node.x, y: cy };
                case 'right': return { x: node.x + node.width, y: cy };
                default: return { x: cx, y: cy };
            }
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => fitMapToView(), 150);
        });

        // Boot system on window load
        window.onload = function() {
            init();
        };
    </script>
</body>
</html>
