<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟电子技术基础知识脉络脑图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="overview.css">
</head>
<body class="w-screen h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col shrink-0 z-20 md:h-full">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center gap-2">
            <div class="min-w-0">
                <h1 class="text-base font-bold text-white truncate">
                    <i class="fa-solid fa-microchip text-indigo-400 mr-1"></i>模电脉络
                </h1>
                <p class="text-[11px] text-slate-500">全11章 · 点击章节进入详细页</p>
            </div>
            <button type="button" onclick="resetView()" class="shrink-0 p-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs" title="适应窗口">
                <i class="fa-solid fa-expand"></i>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-3">
            <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">章节</p>
            <div id="chapter-list" class="grid grid-cols-2 gap-1.5"></div>
        </div>
        <p class="hidden md:block p-3 text-[10px] text-slate-600 border-t border-slate-800">
            拖拽平移 · 滚轮缩放 · 内容在 <code class="text-slate-500">pages/</code>
        </p>
    </aside>

    <main class="flex-1 relative bg-slate-950 bg-grid overflow-hidden">
        <div class="absolute top-3 right-3 z-10 flex gap-1">
            <button type="button" onclick="zoom(1.12)" class="p-2 bg-slate-800/90 hover:bg-slate-700 text-white rounded-lg border border-slate-700 text-sm" title="放大"><i class="fa-solid fa-plus"></i></button>
            <button type="button" onclick="zoom(0.89)" class="p-2 bg-slate-800/90 hover:bg-slate-700 text-white rounded-lg border border-slate-700 text-sm" title="缩小"><i class="fa-solid fa-minus"></i></button>
        </div>
        <div id="workspace" class="canvas-wrap w-full h-full relative"
             onmousedown="startDrag(event)" onmousemove="drag(event)" onmouseup="endDrag()" onmouseleave="endDrag()">
            <svg id="svg-edges" class="pointer-events-none"></svg>
            <div id="canvas" class="pointer-events-none"></div>
        </div>
    </main>

    <script src="detail-maps.js"></script>
    <script src="overview-data.js"></script>
    <script src="overview.js"></script>
</body>
</html>
