：$V_{IO}$ 是使输出为零时，在输入端加的补偿电压。", "pitfall": ""}, {"type": "choice", "points": 2, "question": "差分放大电路的共模增益理想情况下等于？", "options": ["0", "1", "$A_{vd}$", "$\\infty$"], "answer": 0, "explanation": "<strong>正确答案</strong>：A。<br><br><strong>解析</strong>：理想情况下，差分放大电路完全对称，共模增益 $A_{vc} = 0$。", "pitfall": ""}, {"type": "choice", "points": 2, "question": "电流源的内阻越大，差分放大电路的？", "options": ["差模增益越大", "共模增益越小", "输入电阻越小", "输出电阻越小"], "answer": 1, "explanation": "<strong>正确答案</strong>：B。<br><br><strong>解析</strong>：电流源内阻越大，对共模信号的负反馈越强，共模增益越小。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "差分放大电路可以抑制零点漂移。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析</strong>：差分放大电路通过对称结构，可以抑制温度变化等引起的零点漂移。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "共模信号是两个输入端信号大小相等、极性相反。", "options": [], "answer": 1, "explanation": "<strong>正确答案</strong>：错误。<br><br><strong>解析</strong>：共模信号是两个输入端信号大小相等、极性相同；差模信号才是大小相等、极性相反。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "镜像电流源的输出电流与参考电流相等。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析</strong>：对于参数完全相同的镜像电流源，$I_O = I_{REF}$。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "有源负载可以提高放大电路的电压增益。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析</strong>：有源负载的交流电阻很大，可以大大提高电压增益。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "差分放大电路的共模抑制比越大越好。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析</strong>：$K_{CMR}$ 越大，抑制共模干扰的能力越强。", "pitfall": ""}, {"type": "short", "points": 6, "question": "解释差分放大电路抑制共模信号的原理。", "options": [], "answer": "差分放大电路通过对称结构抑制共模信号：1. 电路完全对称时，共模信号在两个输出端产生相同的变化，双端输出时相互抵消。2. 电流源的内阻对共模信号形成强负反馈，使共模增益很小。3. 共模抑制比 $K_{CMR} = |A_{vd}/A_{vc}|$，电流源内阻越大，$K_{CMR}$ 越大。", "explanation": "", "pitfall": ""}, {"type": "short", "points": 6, "question": "比较差分放大电路的差模和共模特性。", "options": [], "answer": "差模特性：差模增益高，$A_{vd} = -g_m R_D$（单端减半）；差模输入电阻 $R_{id} = 2r_{\\pi}$；差模输出电阻 $R_{od} = 2R_D$。共模特性：共模增益很小，理想情况 $A_{vc} = 0$；共模输入电阻很大；共模抑制比 $K_{CMR}$ 反映抑制共模干扰的能力。", "explanation": "", "pitfall": ""}, {"type": "short", "points": 6, "question": "解释运放的转换速率 $SR$ 的含义和影响。", "options": [], "answer": "转换速率 $SR$ 是运放输出电压的最大变化速率，单位 V/μs。$SR$ 限制了运放处理大信号的能力：当输入信号变化率超过 $SR$ 时，输出不能跟随输入变化，产生失真。$SR$ 越大，高频大信号性能越好。例如：处理10MHz、1V的正弦信号，需要 $SR > 2\\pi \\times 10 \\times 1 = 62.8V/\\mu s$。", "explanation": "", "pitfall": ""}, {"type": "short", "points": 6, "question": "解释镜像电流源的工作原理。", "options": [], "answer": "镜像电流源：两个参数完全相同的晶体管（BJT或MOSFET），$V_{BE}$（或 $V_{GS}$）相同。参考电流 $I_{REF}$ 流过一个管子，产生 $V_{BE}$；另一个管子在相同的 $V_{BE}$ 下，产生相同的电流 $I_O$。因此 $I_O \\approx I_{REF}$，就像镜像一样。输出电流与负载无关，具有恒流特性。", "explanation": "", "pitfall": ""}, {"type": "essay", "points": 8, "question": "试分析差分放大电路的工作原理，并说明为什么它能抑制零点漂移。", "options": [], "answer": "差分放大电路由两个对称的放大电路组成，共用偏置电流源。差模信号：两输入端信号相反，两管电流一增一减，双端输出叠加。共模信号：两输入端信号相同，两管电流同增同减，双端输出抵消。抑制零点漂移的原理：温度变化等引起两管电流同向变化（相当于共模信号），由于电路对称，双端输出时相互抵消，从而抑制零点漂移。", "explanation": "", "pitfall": ""}, {"type": "essay", "points": 8, "question": "解释为什么有源负载可以提高放大电路的电压增益，并分析其优缺点。", "options": [], "answer": "有源负载用电流源代替电阻作为负载。电流源的交流电阻很大（理想情况无穷大），根据 $A_v = -g_m R_L$，负载电阻增大，电压增益提高。优点：增益高，单端输出增益与双端输出相同。缺点：电路复杂，需要额外的偏置电路；输出摆幅受限于电流源的饱和电压；频率响应可能变差。", "explanation": "", "pitfall": ""}, {"type": "essay", "points": 10, "question": "设计一个差分放大电路，要求差模增益 $|A_{vd}| \\geq 20$，共模抑制比 $K_{CMR} \\geq 60dB$。选择合适的电路结构和元件参数。", "options": [], "answer": "选择BJT差分放大电路，双电源供电（±12V）。取 $I_{EE} = 1mA$，则每管 $I_C = 0.5mA$。$r_{\\pi} = \\beta V_T/I_C = 100 \\times 26/0.5 = 5.2k\\Omega$。取 $R_C = 10k\\Omega$，$A_{vd} = -\\beta R_C/r_{\\pi} = -100 \\times 10/5.2 = -192$，满足要求。电流源内阻 $R_{EE} > 1M\\Omega$，$K_{CMR} = R_{EE}/r_e = 1M/52 = 19200$（约86dB），满足要求。输入电阻 $R_{id} = 2r_{\\pi} = 10.4k\\Omega$。", "explanation": "", "pitfall": ""}, {"type": "comprehensive", "points": 20, "question": "某BJT差分放大电路：$V_{CC} = V_{EE} = 12V$，$I_{EE} = 1mA$，$R_C = 10k\\Omega$，$R_E = 100k\\Omega$，$\\beta = 100$。(1)计算静态工作点；(2)计算差模增益 $A_{vd}$；(3)计算共模增益 $A_{vc}$；(4)计算共模抑制比 $K_{CMR}$；(5)计算差模输入电阻 $R_{id}$。", "options": [], "answer": "(1) 静态：$I_{C1} = I_{C2} = I_{EE}/2 = 0.5mA$，$V_{CE1} = V_{CE2} = V_{CC} - I_C R_C - V_E = 12 - 0.5 \\times 10 - (-0.7) = 7.7V$。(2) $r_{\\pi} = \\beta V_T/I_C = 100 \\times 26/0.5 = 5.2k\\Omega$，$A_{vd} = -\\beta R_C/r_{\\pi} = -100 \\times 10/5.2 = -192$（单端输出为-96）。(3) $A_{vc} = -\\beta R_C/(r_{\\pi} + 2(1+\\beta)R_E) \\approx -R_C/(2R_E) = -10/200 = -0.05$。(4) $K_{CMR} = |A_{vd}/A_{vc}| = 192/0.05 = 3840$（约72dB）。(5) $R_{id} = 2r_{\\pi} = 10.4k\\Omega$。", "explanation": "", "pitfall": ""}];

      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65+j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + q.explanation + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  // Re-render MathJax for dynamically inserted formulas
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function(err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) {
    all[i].classList.remove('selected');
  }
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) {
    target.classList.add('selected');
  }
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) {
    radio.checked = true;
  }
}

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      var radio = document.querySelector('input[name="' + qid + '"]:checked');
      if (radio && parseInt(radio.value) === q.answer) {
        score += q.points;
        card.classList.add('correct');
        badge.className = 'badge badge-ok';
        badge.textContent = LABELS.correct_label;
        correctEl.innerHTML = '';
        var correctOpt = document.getElementById('opt-' + qid + '-' + q.answer);
        if (correctOpt) correctOpt.classList.add('correct-answer');
      } else {
        card.classList.add('wrong');
        badge.className = 'badge badge-no';
        badge.textContent = LABELS.wrong_label;
        var ansText = q.type === 'choice'
          ? String.fromCharCode(65+q.answer) + '. ' + (q.options ? q.options[q.answer] : '')
          : (q.answer === 0 ? LABELS.true_label : LABELS.false_label);
        correctEl.innerHTML = LABELS.answer_prefix + ansText;
        if (radio) {
          var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
          if (wrongOpt) wrongOpt.classList.add('wrong-answer');
        }
        var correctOpt = document.getElementById('opt-' + qid + '-' + q.answer);
        if (correctOpt) correctOpt.classList.add('correct-answer');
      }
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = score;
    sb.scrollIntoView({behavior:'smooth'});
  }

  var opts = document.querySelectorAll('.option');
  for (var i = 0; i < opts.length; i++) opts[i].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var i = 0; i < tas.length; i++) tas[i].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = LABELS.graded_label;
  }

  // Re-render MathJax for revealed explanations
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function(err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

</script>
