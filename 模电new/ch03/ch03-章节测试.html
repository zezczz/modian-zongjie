": "choice", "points": 2, "question": "二极管小信号模型中的微变电阻 $r_d$ 与什么有关？", "options": ["与静态工作点无关", "与静态工作点有关", "只与温度有关", "只与频率有关"], "answer": 1, "explanation": "<strong>正确答案</strong>：B。<br><br><strong>解析**：$r_d = V_T/I_D$，与静态工作点 $I_D$ 有关，$I_D$ 越大，$r_d$ 越小。", "pitfall": ""}, {"type": "choice", "points": 2, "question": "P型半导体中掺入的是？", "options": ["五价元素", "四价元素", "三价元素", "二价元素"], "answer": 2, "explanation": "<strong>正确答案</strong>：C。<br><br><strong>解析**：P型半导体掺入三价元素（如硼），产生空穴作为多数载流子。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "本征半导体中自由电子和空穴成对出现。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析**：本征激发产生自由电子和空穴，两者成对出现，称为电子-空穴对。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "PN结反向偏置时，电流主要由多子扩散形成。", "options": [], "answer": 1, "explanation": "<strong>正确答案</strong>：错误。<br><br><strong>解析**：PN结反向偏置时，电流主要由少子漂移形成，而不是多子扩散。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "N型半导体整体带负电。", "options": [], "answer": 1, "explanation": "<strong>正确答案</strong>：错误。<br><br><strong>解析**：N型半导体整体呈电中性，施主原子带正电，自由电子带负电，电荷平衡。", "pitfall": "易错点：N型半导体中自由电子多，但整体不带电。"}, {"type": "tf", "points": 1, "question": "二极管的反向饱和电流与温度有关。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析**：反向饱和电流 $I_S$ 随温度升高而增大，温度每升高10℃，$I_S$ 约增大一倍。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "桥式整流电路的负载平均电压是半波整流的两倍。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析**：桥式整流 $V_L \\approx 0.9V_2$，半波整流 $V_L \\approx 0.45V_2$，前者是后者的两倍。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "齐纳击穿是可逆的，热击穿是不可逆的。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析**：齐纳击穿和雪崩击穿属于电击穿，是可逆的；热击穿会导致器件永久损坏，是不可逆的。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "二极管的门坎电压 $V_{th}$ 等于导通电压。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析**：门坎电压（死区电压）$V_{th}$ 是二极管开始导通的电压，硅管约0.5V，锗管约0.1V。导通后正向压降硅管约0.7V，锗管约0.2-0.3V。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "点接触型二极管适用于高频电路。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析**：点接触型二极管结电容小，适用于高频检波、混频等电路。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "肖特基二极管的正向压降低于普通硅二极管。", "options": [], "answer": 0, "explanation": "<strong>正确答案</strong>：正确。<br><br><strong>解析**：肖特基二极管正向压降约0.2-0.3V，低于普通硅二极管的0.7V。", "pitfall": ""}, {"type": "short", "points": 6, "question": "解释PN结的单向导电性原理。", "options": [], "answer": "PN结正向偏置时，外加电场削弱内电场，耗尽层变窄，多子扩散增强，形成较大的正向电流，呈现低电阻。PN结反向偏置时，外加电场增强内电场，耗尽层变宽，多子扩散受阻，只有少子漂移形成很小的反向电流，呈现高电阻。", "explanation": "", "pitfall": ""}, {"type": "short", "points": 6, "question": "比较二极管的理想模型、恒压降模型和小信号模型的适用场合。", "options": [], "answer": "理想模型：正向短路、反向开路，适用于定性分析和初步估算。恒压降模型：正向压降为常数（硅管0.7V），适用于一般工程计算。小信号模型：微变电阻 $r_d = V_T/I_D$，适用于小信号交流分析，需要先确定静态工作点。", "explanation": "", "pitfall": ""}, {"type": "short", "points": 6, "question": "说明N型半导体和P型半导体的掺杂元素和载流子类型。", "options": [], "answer": "N型半导体：掺入五价元素（如磷、砷），多数载流子是自由电子，少数载流子是空穴。五价原子提供一个自由电子后成为正离子（施主杂质）。P型半导体：掺入三价元素（如硼、铝），多数载流子是空穴，少数载流子是自由电子。三价原子接受一个电子后成为负离子（受主杂质）。", "explanation": "", "pitfall": ""}, {"type": "short", "points": 6, "question": "解释PN结反向击穿的两种类型及其产生条件。", "options": [], "answer": "1. 雪崩击穿：反向电压增大到一定程度，漂移运动的少子获得足够动能，撞击出更多电子-空穴对，产生倍增效应。发生在掺杂浓度低、耗尽层宽的PN结。2. 齐纳击穿：反向电压增大到一定程度，强电场直接破坏共价键，产生大量电子-空穴对。发生在掺杂浓度高、耗尽层窄的PN结。", "explanation": "", "pitfall": ""}, {"type": "essay", "points": 8, "question": "试分析二极管整流电路（半波和桥式）的工作原理，并比较两种电路的优缺点。", "options": [], "answer": "半波整流：只利用交流电的正半周，二极管导通时负载获得电压，截止时负载电压为零。优点：电路简单，只需一个二极管。缺点：效率低（$V_L = 0.45V_2$），纹波大。桥式整流：利用交流电的正负两个半周，四个二极管交替导通。优点：效率高（$V_L = 0.9V_2$），纹波小，变压器利用率高。缺点：需要四个二极管，电路稍复杂。", "explanation": "", "pitfall": ""}, {"type": "essay", "points": 8, "question": "解释二极管小信号模型的建立条件和微变电阻 $r_d$ 的计算方法，并说明其在电路分析中的应用。", "options": [], "answer": "建立条件：二极管工作在正向偏置状态，且信号幅值很小（$v_d << V_T$），使二极管特性曲线在工作点附近近似为直线。微变电阻 $r_d = V_T/I_D$，其中 $V_T \\approx 26mV$（常温），$I_D$ 是静态工作点电流。应用：在小信号分析中，将二极管用 $r_d$ 替代，与其它元件组成线性电路，用叠加定理等方法求解。", "explanation": "", "pitfall": ""}, {"type": "essay", "points": 10, "question": "设计一个硅二极管稳压电路，要求输出电压稳定在5V，负载电流变化范围为10-50mA。选择合适的齐纳二极管，计算限流电阻，并分析电路性能。", "options": [], "answer": "选择 $V_Z = 5V$ 的齐纳二极管，设输入电压 $V_I = 12V$。限流电阻 $R = (V_I - V_Z)/I_Z$，取 $I_Z = 20mA$（中间值），则 $R = (12-5)/0.02 = 350\\Omega$，取标准值360Ω。当负载电流 $I_L = 10mA$ 时，$I_Z = (12-5)/360 - 0.01 = 9.4mA$；当 $I_L = 50mA$ 时，$I_Z = 19.4 - 0.05 = -0.6mA$（截止）。需要重新计算：取 $R = 150\\Omega$，$I_Z$ 范围为26.7mA-13.3mA，满足要求。输出电阻 $r_o = r_z // R \\approx r_z$，稳压系数与 $r_z$ 有关。", "explanation": "", "pitfall": ""}, {"type": "comprehensive", "points": 20, "question": "某硅二极管电路如图所示：$V_{DD} = 5V$，$R = 5k\\Omega$，$v_s = 0.1\\sin\\omega t$ V。(1)用恒压降模型求直流工作点；(2)用小信号模型求交流输出电压；(3)求总输出电压；(4)分析二极管的作用。", "options": [], "answer": "(1) 直流分析：令 $v_s = 0$，$V_D = 0.7V$，$I_D = (V_{DD} - V_D)/R = (5-0.7)/5k = 0.86mA$，$V_O = V_D = 0.7V$。(2) 交流分析：$r_d = V_T/I_D = 26mV/0.86mA = 30.2\\Omega$，$v_o = \\frac{r_d}{R+r_d}v_s \\approx \\frac{30.2}{5000+30.2} \\times 0.1\\sin\\omega t = 0.6\\sin\\omega t$ mV。(3) 总输出电压：$v_O = V_O + v_o = 0.7 + 0.0006\\sin\\omega t$ V。(4) 二极管的作用：提供直流偏置（0.7V），对交流信号起分压作用（衰减约83倍）。", "explanation": "", "pitfall": ""}];
var LABELS = {"page_title": "章节测试", "section": {"choice": "一、选择题", "tf": "二、判断题", "short": "三、简答题", "essay": "四、问答题", "comprehensive": "五、综合题"}, "section_order": ["choice", "tf", "short", "essay", "comprehensive"], "points_suffix": "分", "true_label": "正确", "false_label": "错误", "placeholder": "在此作答...", "pitfall_prefix": "易错提醒：", "correct_label": "正确", "wrong_label": "错误", "answer_prefix": "正确答案：", "reference_label": "参考答案", "graded_label": "已批改", "grade_button": "提交批改", "score_label": "总分", "duration_prefix": "满分 100 分 | 建议 ", "duration_suffix": " 分钟 | 选择答案后点击提交批改"};

function build(){
  var container = document.getElementById('questions-container');
  if (!container) { console.error('ExamPass: questions-container not found'); return; }
  var h = '';
  var sec = '';
  var titles = LABELS.section;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var s = q.type;
    if (s !== sec) {
      sec = s;
      if (titles[s]) {
        h += '<h3>' + titles[s] + '</h3>';
      }
    }

    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num">' + (i+1) + '. (' + q.points + ' ' + LABELS.points_suffix + ')</div>';
    h += '<div class="q-text">' + q.question + '</div>';

    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65+j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + q.explanation + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  // Re-render MathJax for dynamically inserted formulas
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function(err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) {
    all[i].classList.remove('selected');
  }
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) {
    target.classList.add('selected');
  }
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) {
    radio.checked = true;
  }
}

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      var radio = document.querySelector('input[name="' + qid + '"]:checked');
      if (radio && parseInt(radio.value) === q.answer) {
        score += q.points;
        card.classList.add('correct');
        badge.className = 'badge badge-ok';
        badge.textContent = LABELS.correct_label;
        correctEl.innerHTML = '';
        var correctOpt = document.getElementById('opt-' + qid + '-' + q.answer);
        if (correctOpt) correctOpt.classList.add('correct-answer');
      } else {
        card.classList.add('wrong');
        badge.className = 'badge badge-no';
        badge.textContent = LABELS.wrong_label;
        var ansText = q.type === 'choice'
          ? String.fromCharCode(65+q.answer) + '. ' + (q.options ? q.options[q.answer] : '')
          : (q.answer === 0 ? LABELS.true_label : LABELS.false_label);
        correctEl.innerHTML = LABELS.answer_prefix + ansText;
        if (radio) {
          var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
          if (wrongOpt) wrongOpt.classList.add('wrong-answer');
        }
        var correctOpt = document.getElementById('opt-' + qid + '-' + q.answer);
        if (correctOpt) correctOpt.classList.add('correct-answer');
      }
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = score;
    sb.scrollIntoView({behavior:'smooth'});
  }

  var opts = document.querySelectorAll('.option');
  for (var i = 0; i < opts.length; i++) opts[i].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var i = 0; i < tas.length; i++) tas[i].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = LABELS.graded_label;
  }

  // Re-render MathJax for revealed explanations
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function(err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

</script>

</html>
